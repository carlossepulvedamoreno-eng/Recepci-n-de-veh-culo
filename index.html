<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción Vehículos</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 15px;
            margin: 0;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
        }
        h2 { margin-bottom: 5px; font-size: 24px; }
        p { margin-top: 0; color: #ccc; font-size: 14px; }
        .error-link { color: #25D366; font-weight: bold; text-decoration: none; display: inline-block; margin-bottom: 15px; }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0 10px 0;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        select, input[type="text"], input[type="tel"], textarea {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #111;
            color: #fff;
            font-size: 14px;
            text-align: center;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            text-align: left;
            margin-top: 10px;
        }

        .grid-cargos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            text-align: left;
            margin: 10px 0;
            padding: 0 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"],
        .checkbox-label input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #007bff;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 14px;
            border: none;
            border-radius: 8px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Recepción Vehículos</h2>
    <p>Formulario para el envío de datos</p>
    <a href="#" class="error-link">Reportar error en la app</a>

    <!-- Código Inspector y PPU / Móvil -->
    <div class="row">
        <label>Código :</label>
        <select id="codigo">
            <option value="I - 151">I - 151</option>
            <option value="I - 208">I - 208</option>
            <option value="I - 326">I - 326</option>
            <option value="I - 335">I - 335</option>
            <option value="I - 111">I - 111</option>
            <option value="I - 152">I - 152</option>
            <option value="I - 256">I - 256</option>
            <option value="I - 259">I - 259</option>
            <option value="I - 265">I - 265</option>
            <option value="I - 282">I - 282</option>
            <option value="I - 336">I - 336</option>
            <option value="I - 55">I - 55</option>
            <option value="I - 332">I - 332</option>
            <option value="I - 213">I - 213</option>
            <option value="I - 321">I - 321</option>
        </select>

        <label>Móvil :</label>
        <input type="text" id="ppu1" maxlength="4" style="width: 60px; text-transform:uppercase;" oninput="autoAvanzarPpu(this)">
        <span>-</span>
        <input type="tel" inputmode="numeric" id="ppu2" maxlength="2" style="width: 40px; text-transform:uppercase;">
    </div>

    <!-- Verificar Cargos -->
    <div class="section-title">Verificar Cargos</div>
    <div class="row">
        <label>Conos :</label>
        <input type="tel" inputmode="numeric" id="conos" maxlength="2" style="width: 45px;">
    </div>

    <div class="grid-cargos">
        <label class="checkbox-label" style="grid-column: span 2;"><input type="checkbox" id="chk_todos" onchange="toggleTodos(this)"> Marcar / Desmarcar Todos</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Aseo"> Aseo</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Tarjeta de Combustible"> Tarjeta de Combustible</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Documentos Vehículo"> Documentos Vehículo</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Kit de Seguridad"> Kit de Seguridad</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Llave Rueda"> Llave Rueda</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Gata"> Gata</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Rueda Repuesto"> Rueda Repuesto</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Extintor"> Extintor</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Bitácora Virtual"> Bitácora Virtual</label>
    </div>

    <!-- Carga Combustible -->
    <div class="section-title">Carga Combustible :</div>
    <div class="row">
        <label class="checkbox-label"><input type="radio" name="combustible" value="Si"> Si</label>
        <label class="checkbox-label"><input type="radio" name="combustible" value="No" checked> No</label>
    </div>

    <!-- Lugar -->
    <div class="row" style="margin-top: 15px;">
        <label>Lugar :</label>
        <select id="lugar" style="max-width: 250px;">
            <option value="">[Seleccione]</option>
            <option value="C-107">C-107</option>
            <option value="C-108">C-108</option>
            <option value="C-109">C-109</option>
            <option value="C-110">C-110</option>
            <option value="C-111">C-111</option>
            <option value="C-112">C-112</option>
            <option value="C-143">C-143</option>
            <option value="C-144">C-144</option>
            <option value="C-145">C-145</option>
            <option value="C-146">C-146</option>
            <option value="C-147">C-147</option>
            <option value="C-148">C-148</option>
            <option value="C-149">C-149</option>
            <option value="Otra comuna">Otra comuna</option>
        </select>
    </div>

    <!-- Hora -->
    <div class="row">
        <label>Hora :</label>
        <input type="tel" inputmode="numeric" id="hora1" maxlength="2" style="width: 40px;">
        <span>:</span>
        <input type="tel" inputmode="numeric" id="hora2" maxlength="2" style="width: 40px;">
        <span>hrs</span>
    </div>

    <!-- Boucher -->
    <div class="row">
        <label>Boucher :</label>
        <input type="tel" inputmode="numeric" id="boucher" maxlength="6" style="width: 80px;">
    </div>

    <!-- Estado Estanque -->
    <div class="row">
        <label>Estanque :</label>
        <select id="estanque">
            <option value="100 %" selected>100 %</option>
            <option value="90 %">90 %</option>
            <option value="80 %">80 %</option>
            <option value="70 %">70 %</option>
            <option value="50 %">50 %</option>
            <option value="30 %">30 %</option>
            <option value="20 %">20 %</option>
            <option value="10 %">10 %</option>
        </select>
    </div>

    <!-- Novedades -->
    <textarea id="novedades" rows="3" placeholder="Novedades Vehículo :"></textarea>

    <!-- Botón Enviar -->
    <button class="btn-whatsapp" onclick="enviarWhatsApp()">
        <span>Enviar WhatsApp</span>
    </button>
</div>

<script>
function autoAvanzarPpu(elemento) {
    if (elemento.value.length >= 4) {
        document.getElementById('ppu2').focus();
    }
}

function toggleTodos(master) {
    const checkboxes = document.querySelectorAll('.cargo-item');
    checkboxes.forEach(cb => cb.checked = master.checked);
}

function enviarWhatsApp() {
    // Código en negrita y mayúscula
    const codigoRaw = document.getElementById('codigo').value;
    const codigo = `*${codigoRaw.toUpperCase()}*`;

    const ppu1 = document.getElementById('ppu1').value.toUpperCase();
    const ppu2 = document.getElementById('ppu2').value.toUpperCase();
    const movil = (ppu1 && ppu2) ? `${ppu1}-${ppu2}` : `${ppu1}${ppu2}`;
    const conos = document.getElementById('conos').value || '';

    // Procesar todos los cargos con ✅ o ❌
    const cargosElementos = document.querySelectorAll('.cargo-item');
    let listaCargosTexto = '';
    
    cargosElementos.forEach((cb, idx) => {
        const icono = cb.checked ? '✅' : '❌';
        const comaOPunto = (idx === cargosElementos.length - 1) ? '.' : ',';
        listaCargosTexto += `${icono} _${cb.value}_${comaOPunto}%0A`;
    });

    // Carga Combustible (Si es "No", queda vacío)
    const combustibleRadio = document.querySelector('input[name="combustible"]:checked').value;
    const combustibleTexto = (combustibleRadio === "No") ? "" : "SI";

    const lugar = document.getElementById('lugar').value;
    
    const h1 = document.getElementById('hora1').value;
    const h2 = document.getElementById('hora2').value;
    const hora = (h1 && h2) ? `${h1} : ${h2} hrs` : '';

    const boucher = document.getElementById('boucher').value || '';
    const estanque = document.getElementById('estanque').value;
    const novedades = document.getElementById('novedades').value || "Sin novedades";

    // Construcción del mensaje para WhatsApp
    let mensaje = `${codigo}%0A` +
                  `*Móvil :* _${movil}_%0A` +
                  `*Conos :* _${conos}_%0A` +
                  `*Cargos :*%0A` +
                  `${listaCargosTexto}`;

    if (combustibleTexto !== "") {
        mensaje += `*Combustible :* _${combustibleTexto}_%0A`;
    }

    mensaje += `*Lugar :* _${lugar}_%0A` +
               `*Hora :* _${hora}_%0A` +
               `*Boucher :* _${boucher}_%0A` +
               `*Estanque :* _${estanque}_%0A` +
               `*Novedades Vehículo :*%0A` +
               `_${novedades}_`;

    window.open(`https://api.whatsapp.com/send?text=${mensaje}`, '_blank');
}
</script>

</body>
</html>
