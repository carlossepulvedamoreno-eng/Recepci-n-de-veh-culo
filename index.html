<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción Vehículos</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 15px;
            margin: 0;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
        }
        h2 { margin-bottom: 5px; font-size: 24px; }
        p { margin-top: 0; color: #ccc; font-size: 14px; }
        .error-link { color: #25D366; font-weight: bold; text-decoration: none; display: inline-block; margin-bottom: 15px; }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0 10px 0;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        select, input[type="text"], input[type="number"], textarea {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #111;
            color: #fff;
            font-size: 14px;
            text-align: center;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            text-align: left;
            margin-top: 10px;
        }

        .grid-cargos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            text-align: left;
            margin: 10px 0;
            padding: 0 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"], 
        .checkbox-label input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #007bff;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 14px;
            border: none;
            border-radius: 8px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Recepción Vehículos</h2>
    <p>Formulario para el envío de datos</p>
    <a href="#" class="error-link">Reportar error en la app</a>

    <!-- Código Inspector y PPU -->
    <div class="row">
        <label>Código :</label>
        <select id="codigo">
            <option value="I-151">I-151</option>
            <option value="I-208">I-208</option>
            <option value="I-326">I-326</option>
            <option value="I-335">I-335</option>
            <option value="I-111">I-111</option>
            <option value="I-152">I-152</option>
            <option value="I-256">I-256</option>
            <option value="I-259">I-259</option>
            <option value="I-265">I-265</option>
            <option value="I-282">I-282</option>
            <option value="I-336">I-336</option>
            <option value="I-55">I-55</option>
            <option value="I-332">I-332</option>
            <option value="I-213">I-213</option>
            <option value="I-321">I-321</option>
        </select>

        <label>PPU :</label>
        <input type="text" id="ppu1" placeholder="XXXX" maxlength="4" style="width: 60px; text-transform:uppercase;">
        <span>*</span>
        <input type="text" id="ppu2" placeholder="XX" maxlength="2" style="width: 40px; text-transform:uppercase;">
    </div>

    <!-- Tipo de Vehículo -->
    <div class="section-title">Vehículo :</div>
    <div class="row">
        <label class="checkbox-label"><input type="radio" name="vehiculo" value="Auto" checked> Auto</label>
        <label class="checkbox-label"><input type="radio" name="vehiculo" value="Moto"> Moto</label>
    </div>

    <!-- Verificar Cargos -->
    <div class="section-title">Verificar Cargos</div>
    <div class="row">
        <input type="text" id="conos" placeholder="XX" maxlength="2" style="width: 45px;">
        <label>Conos</label>
    </div>

    <div class="grid-cargos">
        <label class="checkbox-label"><input type="checkbox" id="chk_todos" onchange="toggleTodos(this)"> Todos</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Aseo"> Aseo</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Tarj. Combustible"> Tarj. Combustible</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Kit de Seguridad"> Kit de Seguridad</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Doc. Vehículo"> Doc. Vehículo</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Gata"> Gata</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Llave Rueda"> Llave Rueda</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Extintor"> Extintor</label>
        <label class="checkbox-label"><input type="checkbox" class="cargo-item" value="Rueda Repuesto"> Rueda Repuesto</label>
    </div>

    <!-- Carga Combustible -->
    <div class="section-title">Carga Combustible :</div>
    <div class="row">
        <label class="checkbox-label"><input type="radio" name="combustible" value="Si" checked> Si</label>
        <label class="checkbox-label"><input type="radio" name="combustible" value="No"> No</label>
    </div>

    <!-- Estado Estanque -->
    <div class="row">
        <label>Estado estanque :</label>
        <select id="estanque">
            <option value="100%">100 %</option>
            <option value="75%">75 %</option>
            <option value="50%">50 %</option>
            <option value="25%">25 %</option>
        </select>
    </div>

    <!-- Boucher -->
    <div class="row">
        <label>Boucher :</label>
        <input type="text" id="boucher" placeholder="XXXX" maxlength="4" style="width: 70px;">
        <span style="font-size: 12px; color: #aaa;">(Últimos 4 dígitos)</span>
    </div>

    <!-- Lugar con Flecha / Desplegable -->
    <div class="row">
        <label>Lugar :</label>
        <select id="lugar" style="max-width: 250px;">
            <option value="No especificado">[Seleccione]</option>
            <option value="(01) AVDA. COLON 7400">(01) AVDA. COLON 7400</option>
            <option value="(02) AVDA. LAS CONDES 10.912">(02) AVDA. LAS CONDES 10.912</option>
            <option value="(03) AVDA. LAS CONDES 8170">(03) AVDA. LAS CONDES 8170</option>
            <option value="(04) AV LAS CONDES 12.145">(04) AV LAS CONDES 12.145</option>
            <option value="(05) CALLE LOS POZOS 7180">(05) CALLE LOS POZOS 7180</option>
            <option value="(06) CAMINO A FARELLONES 14380">(06) CAMINO A FARELLONES 14380</option>
            <option value="(07) CAMINO EL ALBA 9610">(07) CAMINO EL ALBA 9610</option>
            <option value="(09) CRISTOBAL COLON 4359">(09) CRISTOBAL COLON 4359</option>
            <option value="(10) CRISTOBAL COLON 7026">(10) CRISTOBAL COLON 7026</option>
            <option value="(11) ESTACIÓN DE SERVICIO DE OTRA COMUNA RM">(11) ESTACIÓN DE SERVICIO DE OTRA COMUNA RM</option>
            <option value="(12) ESTACIÓN DE SERVICIO DE OTRAS REGIONES">(12) ESTACIÓN DE SERVICIO DE OTRAS REGIONES</option>
            <option value="(13) GENERAL BLANCHE 11860">(13) GENERAL BLANCHE 11860</option>
            <option value="(14) ISABEL LA CATOLICA 4020">(14) ISABEL LA CATOLICA 4020</option>
            <option value="(15) LAS CONDES 8321">(15) LAS CONDES 8321</option>
            <option value="(16) LOTA 2864">(16) LOTA 2864</option>
            <option value="(17) MANQUEHUE NORTE 674 / PDTE.RIESCO">(17) MANQUEHUE NORTE 674 / PDTE.RIESCO</option>
            <option value="(18) PATAGONIA 75">(18) PATAGONIA 75</option>
            <option value="(19) SAN RAMON 2701, SAN CARLOS APOQUINDO">(19) SAN RAMON 2701, SAN CARLOS APOQUINDO</option>
            <option value="(20) SANTA MARIA 2890">(20) SANTA MARIA 2890</option>
            <option value="(21) TOMAS MORO 1945">(21) TOMAS MORO 1945</option>
        </select>
    </div>

    <!-- Hora -->
    <div class="row">
        <label>Hora :</label>
        <input type="text" id="hora1" placeholder="XX" maxlength="2" style="width: 40px;">
        <span>:</span>
        <input type="text" id="hora2" placeholder="XX" maxlength="2" style="width: 40px;">
        <span>Hrs.</span>
    </div>

    <!-- Novedades -->
    <textarea id="novedades" rows="3" placeholder="Novedades Vehículo"></textarea>

    <!-- Botón Enviar -->
    <button class="btn-whatsapp" onclick="enviarWhatsApp()">
        <span>Enviar WhatsApp</span>
    </button>
</div>

<script>
function toggleTodos(master) {
    const checkboxes = document.querySelectorAll('.cargo-item');
    checkboxes.forEach(cb => cb.checked = master.checked);
}

function enviarWhatsApp() {
    const codigo = document.getElementById('codigo').value;
    const ppu1 = document.getElementById('ppu1').value.toUpperCase();
    const ppu2 = document.getElementById('ppu2').value.toUpperCase();
    const ppu = (ppu1 && ppu2) ? `${ppu1}-${ppu2}` : 'Sin especificar';
    
    const vehiculo = document.querySelector('input[name="vehiculo"]:checked').value;
    
    // Cargos
    const conos = document.getElementById('conos').value || '0';
    const cargosSeleccionados = [];
    document.querySelectorAll('.cargo-item:checked').forEach(cb => cargosSeleccionados.push(cb.value));
    const listaCargos = cargosSeleccionados.length > 0 ? cargosSeleccionados.join(', ') : 'Ninguno';

    const combustible = document.querySelector('input[name="combustible"]:checked').value;
    const estanque = document.getElementById('estanque').value;
    const boucher = document.getElementById('boucher').value || 'N/A';
    const lugar = document.getElementById('lugar').value;
    
    const h1 = document.getElementById('hora1').value;
    const h2 = document.getElementById('hora2').value;
    const hora = (h1 && h2) ? `${h1}:${h2} Hrs.` : 'N/A';

    const novedades = document.getElementById('novedades').value || "Sin novedades";

    // Mensaje para WhatsApp
    const mensaje = `*RECEPCIÓN DE VEHÍCULO*%0A` +
                    `*Código:* ${codigo}%0A` +
                    `*PPU:* ${ppu}%0A` +
                    `*Vehículo:* ${vehiculo}%0A` +
                    `----------------------------%0A` +
                    `*VERIFICAR CARGOS*%0A` +
                    `*Conos:* ${conos}%0A` +
                    `*Items:* ${listaCargos}%0A` +
                    `----------------------------%0A` +
                    `*Combustible:* ${combustible}%0A` +
                    `*Estanque:* ${estanque}%0A` +
                    `*Boucher:* ${boucher}%0A` +
                    `*Lugar:* ${lugar}%0A` +
                    `*Hora:* ${hora}%0A` +
                    `----------------------------%0A` +
                    `*Novedades:* ${novedades}`;

    window.open(`https://api.whatsapp.com/send?text=${mensaje}`, '_blank');
}
</script>

</body>
</html>
