<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        select, input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; background-color: #222; color: #fff; box-sizing: border-box; }
        .inline-fields { display: flex; gap: 10px; }
        .btn-whatsapp { background-color: #25D366; color: white; font-size: 18px; font-weight: bold; padding: 15px; border: none; border-radius: 5px; width: 100%; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>Recepción Vehículos</h2>
    <p>Formulario para el envío de datos</p>
    <label>Código Inspector:</label>
    <select id="codigo">
        <option value="I - 21">I - 21</option>
        <option value="I - 22">I - 22</option>
        <option value="I - 23">I - 23</option>
    </select>
    <label>PPU:</label>
    <div class="inline-fields">
        <input type="text" id="ppu1" placeholder="XXXX" maxlength="4" style="text-transform:uppercase;">
        <input type="text" id="ppu2" placeholder="XX" maxlength="2" style="text-transform:uppercase;">
    </div>
    <label>Vehículo:</label>
    <select id="vehiculo"><option value="Auto">Auto</option><option value="Moto">Moto</option></select>
    <label>Carga Combustible:</label>
    <select id="combustible"><option value="No">No</option><option value="Si">Si</option></select>
    <label>Estado estanque:</label>
    <select id="estanque"><option value="100%">100 %</option><option value="75%">75 %</option><option value="50%">50 %</option><option value="25%">25 %</option></select>
    <label>Novedades Vehículo:</label>
    <textarea id="novedades" rows="3" placeholder="Novedades Vehículo"></textarea>
    <button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar WhatsApp</button>
</div>
<script>
function enviarWhatsApp() {
    const codigo = document.getElementById('codigo').value;
    const ppu = document.getElementById('ppu1').value.toUpperCase() + '-' + document.getElementById('ppu2').value.toUpperCase();
    const vehiculo = document.getElementById('vehiculo').value;
    const combustible = document.getElementById('combustible').value;
    const estanque = document.getElementById('estanque').value;
    const novedades = document.getElementById('novedades').value || "Ninguna";
    const mensaje = `*RECEPCIÓN DE VEHÍCULO*%0A*Inspector:* ${codigo}%0A*PPU:* ${ppu}%0A*Vehículo:* ${vehiculo}%0A*Carga Combustible:* ${combustible}%0A*Estado Estanque:* ${estanque}%0A*Novedades:* ${novedades}`;
    window.open(`https://api.whatsapp.com/send?text=${mensaje}`, '_blank');
}
</script>
</body>
</html>
